server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets: immutable, cache for a year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # WASM: long cache, correct MIME (nginx:alpine already maps .wasm → application/wasm)
    location ~* \.wasm$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime-fetched data (locales, CHANGELOG): revalidate so users see updates
    location ~* \.(json|md)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback for everything else
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
